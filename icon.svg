<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Giveaway Roulette">
  <defs>
    <linearGradient id="grTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22252F"/><stop offset="1" stop-color="#121319"/>
    </linearGradient>
    <linearGradient id="grWin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9B7BFF"/><stop offset="1" stop-color="#6847E8"/>
    </linearGradient>
    <linearGradient id="grFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset=".16" stop-color="#fff" stop-opacity="1"/>
      <stop offset=".84" stop-color="#fff" stop-opacity="1"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="grStripFade"><rect x="72" y="150" width="368" height="212" fill="url(#grFade)"/></mask>
    <filter id="grGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="20"/></filter>
    <clipPath id="grTileClip"><rect x="48" y="48" width="416" height="416" rx="112"/></clipPath>
  </defs>
  <rect x="48" y="48" width="416" height="416" rx="112" fill="url(#grTile)"/>
  <rect x="48.5" y="48.5" width="415" height="415" rx="111.5" fill="none" stroke="#fff" stroke-opacity=".07"/>
  <g clip-path="url(#grTileClip)">
    <ellipse cx="256" cy="256" rx="72" ry="122" fill="#7C5CFF" opacity=".55" filter="url(#grGlow)"/>
    <g mask="url(#grStripFade)">
      <rect x="58"  y="186" width="64" height="140" rx="16" fill="#F5B544"/>
      <rect x="136" y="186" width="64" height="140" rx="16" fill="#22C3A6"/>
      <rect x="214" y="168" width="84" height="176" rx="20" fill="url(#grWin)"/>
      <rect x="312" y="186" width="64" height="140" rx="16" fill="#FF6B6B"/>
      <rect x="390" y="186" width="64" height="140" rx="16" fill="#4C8DFF"/>
    </g>
  </g>
  <g fill="#F5F7FF">
    <path d="M256 152 l-17 -24 h34 z"/>
    <rect x="251.5" y="150" width="9" height="212" rx="4.5" opacity=".92"/>
    <path d="M256 360 l-17 24 h34 z"/>
  </g>
</svg>
